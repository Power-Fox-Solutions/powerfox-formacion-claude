name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    name: Saludar en primera interacción
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            ¡Hola! Gracias por abrir tu primer issue en el repo del curso.

            Revisa que hayas:

            - Elegido una plantilla (duda de alumno o bug) en lugar de un issue en blanco
            - Indicado la sesión o el archivo afectado
            - Evitado datos sensibles (credenciales, GUIDs, nombres de clientes reales)

            Cualquier duda de formato, me escribes por aquí y lo miramos juntos.
          pr-message: |
            ¡Bienvenida/o! Es tu primera PR en el repo del curso.

            Antes de pedir merge, repasa el checklist del template:

            - Conventional Commits en los mensajes (`feat:`, `fix:`, `docs:`…)
            - Trabajas dentro de tu carpeta `/alumnos/[tu-nombre]/` salvo que lo hayas acordado
            - Ningún dato real de clientes, credenciales ni URLs internas
            - Estilo didáctico conforme a la skill `formation-content-writer`

            Cuando esté listo, me mencionas en un comentario y lo reviso.
